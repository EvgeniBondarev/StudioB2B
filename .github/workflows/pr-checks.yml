name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore StudioB2B.sln

      - name: Build
        run: dotnet build StudioB2B.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/StudioB2B.Tests.Unit/StudioB2B.Tests.Unit.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results

      - name: Run integration tests
        run: |
          dotnet test tests/StudioB2B.Tests.Integration/StudioB2B.Tests.Integration.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: './test-results/*.trx'

  report:
    name: Publish Test Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '*.trx'
          reporter: dotnet-trx
          fail-on-error: true
