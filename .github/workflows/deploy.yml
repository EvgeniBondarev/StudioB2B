name: Build, Push and Deploy

on:
  push:
    branches: [ "ozon-client-api" ]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bondarevevgeni/studio2b2:latest
            bondarevevgeni/studio2b2:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "🚀 Подключаюсь к серверу..."

            # Переходим в папку проекта
            cd /home/studiob2b

            echo "📂 Текущая директория: $(pwd)"

            echo "🛑 Останавливаю контейнер..."
            docker-compose down || docker compose down

            echo "⬇️ Загружаю новый образ..."
            docker-compose pull

            echo "▶️ Запускаю контейнер..."
            docker-compose up --build -d

            echo "🧹 Очищаю старые образы..."
            docker image prune -f

            echo "⏳ Проверяю статус..."
            sleep 5
            docker-compose ps || docker compose ps

            # Проверяем, запустился ли контейнер
            if [ $(docker ps -q -f name=studiob2b) ]; then
              echo "✅ Контейнер успешно запущен!"
              curl -G "https://interparts.mpsuper.ru/Studio2/SystemNotification/SendNotification" \
                --data-urlencode "key=N7EILuRUhR" \
                --data-urlencode "message=✅ StudioB2B успешно обновлен и запущен!"
            else
              echo "❌ Ошибка: контейнер не запустился!"
              curl -G "https://interparts.mpsuper.ru/Studio2/SystemNotification/SendNotification" \
                --data-urlencode "key=N7EILuRUhR" \
                --data-urlencode "message=❌ Ошибка при обновлении StudioB2B!"
              exit 1
            fi
